<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FrozenPepe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* снежинки */
        .snow {
            position: fixed;
            top: -10px;
            pointer-events: none;
            z-index: 9999;
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* загрузка */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1a;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.3s;
        }
        .loader.hide {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2a3a55;
            border-top-color: #6ea8fe;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(10, 15, 26, 0.92);
            backdrop-filter: blur(10px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app.loaded {
            opacity: 1;
        }

        /* баннер */
        .banner {
            width: 100%;
            aspect-ratio: 16 / 5;
            overflow: hidden;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* шапка */
        .compact-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #1e2a3a;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
        .user-text .name { font-weight: 600; font-size: 14px; }
        .user-text .balance { font-size: 11px; color: #8ab3ff; }
        .stars-badge {
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            color: #ffd966;
        }

        /* страницы */
        .page {
            display: none;
            padding: 12px;
            flex: 1;
            animation: fadeSlide 0.25s ease;
        }
        .page.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(6px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .card {
            background: rgba(20, 28, 40, 0.7);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .glass-btn {
            background: #1f2a3e;
            border: none;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            width: 100%;
            transition: 0.2s;
            cursor: pointer;
            margin-top: 8px;
        }
        .glass-btn:active { transform: scale(0.97); background: #2a3a55; }

        /* кейсы */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .case-card {
            background: #0f1622;
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #2a3a55;
            cursor: pointer;
            transition: 0.2s;
        }
        .case-card:active { transform: scale(0.97); }
        .case-card img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 8px;
        }
        .case-name { font-weight: 600; font-size: 13px; }
        .case-price { font-size: 11px; color: #8ab3ff; margin: 5px 0; }

        /* анимация открытия кейса */
        .case-open-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-radius: 60px;
            text-align: center;
            z-index: 10001;
            font-size: 28px;
            animation: popOpen 0.4s ease;
            border: 2px solid #ffd966;
            box-shadow: 0 0 50px rgba(255,217,102,0.3);
        }
        @keyframes popOpen {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .inv-item {
            background: #0f1622;
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            font-size: 11px;
        }
        .inv-emoji { font-size: 24px; }

        /* топ */
        .top-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .top-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15,22,34,0.8);
            padding: 8px 12px;
            border-radius: 40px;
        }
        .top-rank {
            width: 28px;
            height: 28px;
            background: #1e2a3a;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* навигация */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 6px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            bottom: 0;
        }
        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 0;
        }
        .nav-item.active { color: #6ea8fe; text-shadow: 0 0 6px #6ea8fe; }
        .nav-item span:first-child { font-size: 22px; }

        .empty { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>
<!-- загрузчик -->
<div class="loader" id="loader">
    <div class="spinner"></div>
    <div>❄️ Загрузка FrozenPepe...</div>
</div>

<div class="app" id="app">
    <!-- БАННЕР -->
    <div class="banner">
        <img src="https://i.supaimg.com/35109a74-45db-4273-8c8b-a2cf76a8841a/1e08651f-bb93-4b96-afa6-d9f0022de9f0.png" alt="FrozenPepe">
    </div>

    <!-- ШАПКА -->
    <div class="compact-header">
        <div class="user">
            <div class="avatar" id="userAvatar">👤</div>
            <div class="user-text">
                <div class="name" id="userName">Загрузка...</div>
                <div class="balance" id="balance">❄️ 0</div>
            </div>
        </div>
        <div class="stars-badge" id="starsBalance">⭐ 0</div>
    </div>

    <!-- СТРАНИЦЫ -->
    <div id="homePage" class="page active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div style="background:#111827cc; border-radius:24px; padding:16px; text-align:center;" onclick="navigateTo('cases')">
                <span style="font-size:32px;">📦</span>
                <div>Кейсы</div>
            </div>
            <div style="background:#111827cc; border-radius:24px; padding:16px; text-align:center;" onclick="navigateTo('jackpot')">
                <span style="font-size:32px;">🎰</span>
                <div>Джекпот</div>
            </div>
            <div style="background:#111827cc; border-radius:24px; padding:16px; text-align:center;" onclick="navigateTo('profile')">
                <span style="font-size:32px;">👤</span>
                <div>Профиль</div>
            </div>
            <div style="background:#111827cc; border-radius:24px; padding:16px; text-align:center;" onclick="navigateTo('top')">
                <span style="font-size:32px;">🏆</span>
                <div>Топ</div>
            </div>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 12px;">🎁 Кейсы</h3>
            <div class="cases-grid" id="homeCasesGrid"></div>
        </div>
    </div>

    <div id="casesPage" class="page">
        <h3 style="margin-bottom: 12px;">📦 Все кейсы</h3>
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <div id="jackpotPage" class="page">
        <div class="card" style="text-align:center;">
            <div style="font-size: 36px;">🎰</div>
            <div style="font-size:28px; color:#ffd966;" id="jackpotAmount">0 ❄️</div>
            <select id="jackpotItemSelect" class="glass-btn" style="margin: 10px 0;"></select>
            <button class="glass-btn" onclick="placeJackpotBet()">Сделать ставку</button>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="card" style="text-align:center;">
            <div class="avatar" style="width: 70px; height: 70px; margin: 0 auto 12px;" id="profileAvatar">👤</div>
            <div id="profileName">Имя</div>
            <div id="profileBalance">❄️ 0</div>
            <div id="profileStars">⭐ 0</div>
        </div>
        <div class="card">
            <h3>📊 Статистика</h3>
            <div>Открыто кейсов: <span id="statCases">0</span></div>
            <div>Продано предметов: <span id="statSold">0</span></div>
        </div>
        <button class="glass-btn" onclick="toggleInventory()">📦 Показать инвентарь</button>
        <div id="inventoryBlock" style="display: none;">
            <div class="inventory-grid" id="inventoryGrid"></div>
        </div>
    </div>

    <div id="topPage" class="page">
        <h3 style="margin-bottom: 12px;">🏆 Топ игроков</h3>
        <div class="top-list" id="topList">
            <div class="empty">Загрузка...</div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="navigateTo('home')"><span>🏠</span><span>Главная</span></button>
        <button class="nav-item" onclick="navigateTo('cases')"><span>📦</span><span>Кейсы</span></button>
        <button class="nav-item" onclick="navigateTo('jackpot')"><span>🎰</span><span>Джекпот</span></button>
        <button class="nav-item" onclick="navigateTo('profile')"><span>👤</span><span>Профиль</span></button>
        <button class="nav-item" onclick="navigateTo('top')"><span>🏆</span><span>Топ</span></button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#0a0f1a');
    tg.setBackgroundColor('#0a0f1a');

    let state = {
        balance: 0,
        stars: 0,
        stats: { casesOpened: 0, itemsSold: 0 },
        inventory: []
    };
    let currentPage = 'home';
    let dataLoaded = false;

    const send = (action, data = {}) => tg.sendData(JSON.stringify({ action, ...data }));

    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('profileName').innerText = user.first_name;
        if (user.photo_url) {
            document.getElementById('userAvatar').innerHTML = `<img src="${user.photo_url}">`;
            document.getElementById('profileAvatar').innerHTML = `<img src="${user.photo_url}">`;
        } else {
            document.getElementById('userAvatar').innerText = user.first_name.charAt(0);
            document.getElementById('profileAvatar').innerText = user.first_name.charAt(0);
        }
    }

    function updateUI() {
        document.getElementById('balance').innerText = `❄️ ${state.balance}`;
        document.getElementById('starsBalance').innerText = `⭐ ${state.stars}`;
        document.getElementById('profileBalance').innerHTML = `❄️ ${state.balance}`;
        document.getElementById('profileStars').innerHTML = `⭐ ${state.stars}`;
        document.getElementById('statCases').innerText = state.stats.casesOpened;
        document.getElementById('statSold').innerText = state.stats.itemsSold;
        renderInventory();
        renderCases();
        updateJackpotSelect();
    }

    // КЕЙСЫ (рабочие, с анимацией, без траты снежинок)
    const casesData = [
        { id: 'trash', name: 'Trash Gifts', price: 750, img: 'https://i.supaimg.com/35109a74-45db-4273-8c8b-a2cf76a8841a/a32b454a-9582-4904-bc0c-ea441b62a589.png' },
        { id: 'start', name: 'Start Gifts', price: 750, img: 'https://i.supaimg.com/35109a74-45db-4273-8c8b-a2cf76a8841a/a404bd24-934a-42ad-9db1-d368ecf0e760.png' },
        { id: 'frozen', name: 'Frozen Gifts', price: 1200, img: '' }
    ];

    function renderCases() {
        let html = '';
        casesData.forEach(c => {
            html += `<div class="case-card" onclick="openCase('${c.id}')">
                        ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div style="font-size:48px;">❄️</div>'}
                        <div class="case-name">${c.name}</div>
                        <div class="case-price">${c.price} ❄️</div>
                     </div>`;
        });
        document.getElementById('casesGrid').innerHTML = html;
        document.getElementById('homeCasesGrid').innerHTML = casesData.slice(0, 2).map(c => `
            <div class="case-card" onclick="openCase('${c.id}')">
                ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div style="font-size:32px;">❄️</div>'}
                <div class="case-name">${c.name}</div>
                <div class="case-price">${c.price} ❄️</div>
            </div>
        `).join('');
    }

    // АНИМАЦИЯ ОТКРЫТИЯ КЕЙСА (рабочая, без траты снежинок)
    function openCase(caseId) {
        const caseItem = casesData.find(c => c.id === caseId);
        const rewards = ['🧊 Обычный лед', '❄️ Ледяная крошка', '💎 Ледяной кристалл', '👑 Корона льда'];
        const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
        
        let anim = document.createElement('div');
        anim.className = 'case-open-animation';
        anim.innerHTML = `
            🎁 Открываем ${caseItem.name}... 🎁<br>
            <div style="font-size:48px; margin: 16px 0;">✨</div>
            <div style="font-size:20px; color:#ffd966;">${randomReward}</div>
            <div style="font-size:12px; margin-top:12px;">(тестовое открытие, снежинки не тратятся)</div>
        `;
        document.body.appendChild(anim);
        
        setTimeout(() => {
            anim.remove();
            tg.showAlert(`🎉 Вы выиграли: ${randomReward}! (тест, снежинки не списаны)`);
            // для будущего: отправляем на сервер
            send('open_case', { case_id: caseId });
        }, 1800);
    }

    function renderInventory() {
        const grid = document.getElementById('inventoryGrid');
        if (!state.inventory.length) {
            grid.innerHTML = '<div class="empty">🧊 Пусто</div>';
            return;
        }
        grid.innerHTML = state.inventory.map(item => `
            <div class="inv-item">
                <div class="inv-emoji">${item.emoji || '🎁'}</div>
                <div>${item.name}</div>
                <div style="font-size:9px;">${item.value} ❄️</div>
                <button class="glass-btn" style="font-size:9px; padding:4px; margin-top:4px;" onclick="sellItem('${item.id}', ${item.value})">Продать</button>
            </div>
        `).join('');
    }

    function sellItem(id, price) {
        send('sell_item', { item_id: id, price });
    }

    function toggleInventory() {
        const block = document.getElementById('inventoryBlock');
        block.style.display = block.style.display === 'none' ? 'block' : 'none';
    }

    function updateJackpotSelect() {
        const sel = document.getElementById('jackpotItemSelect');
        if (!state.inventory.length) {
            sel.innerHTML = '<option>Нет предметов</option>';
            return;
        }
        sel.innerHTML = state.inventory.map((item, i) => `<option value="${i}">${item.emoji} ${item.name} (${item.value}❄️)</option>`).join('');
    }

    function placeJackpotBet() {
        const idx = document.getElementById('jackpotItemSelect').value;
        if (!state.inventory[idx]) return tg.showAlert('Выберите предмет');
        send('place_jackpot_bet', { item_id: state.inventory[idx].id });
    }

    function requestTop() {
        send('get_top');
    }

    function renderTop(users) {
        const list = document.getElementById('topList');
        if (!users || !users.length) {
            list.innerHTML = '<div class="empty">❄️ Пока нет игроков</div>';
            return;
        }
        list.innerHTML = users.map((u, i) => `
            <div class="top-row">
                <div class="top-rank">${i+1}</div>
                <div style="width:32px;height:32px;background:#1e2a3a;border-radius:32px;display:flex;align-items:center;justify-content:center;">👤</div>
                <div style="flex:1;">
                    <div>${u.username}</div>
                    <div style="font-size:11px;color:#8ab3ff;">${u.snowflakes} ❄️</div>
                </div>
            </div>
        `).join('');
    }

    function navigateTo(page) {
        if (currentPage === page) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const pages = ['home', 'cases', 'jackpot', 'profile', 'top'];
        const idx = pages.indexOf(page);
        if (idx !== -1) document.querySelectorAll('.nav-item')[idx].classList.add('active');
        currentPage = page;
        if (page === 'jackpot') updateJackpotSelect();
        if (page === 'profile') renderInventory();
        if (page === 'top') requestTop();
    }

    // снежинки
    function createSnow() {
        const snow = document.createElement('div');
        snow.classList.add('snow');
        snow.innerText = '❄️';
        snow.style.left = Math.random() * window.innerWidth + 'px';
        snow.style.fontSize = 12 + Math.random() * 16 + 'px';
        snow.style.animationDuration = 3 + Math.random() * 5 + 's';
        document.body.appendChild(snow);
        setTimeout(() => snow.remove(), 5000);
    }
    setInterval(createSnow, 1000);

    // обработка ответов от бота
    tg.onEvent('message', function(e) {
        try {
            let data = JSON.parse(e.data);
            if (data.type === 'balance') {
                state.balance = data.snowflakes || 0;
                state.stars = data.stars || 0;
            }
            if (data.type === 'inventory') state.inventory = data.items || [];
            if (data.type === 'stats') {
                state.stats.casesOpened = data.casesOpened || 0;
                state.stats.itemsSold = data.itemsSold || 0;
            }
            if (data.type === 'top') renderTop(data.users);
            if (data.type === 'sell_result') {
                tg.showAlert(data.success ? '✅ Предмет продан!' : '❌ Ошибка');
            }
            if (data.type === 'jackpot_result') {
                tg.showAlert(data.win ? `🎉 Выиграли ${data.prize} ❄️!` : '❄️ Не повезло');
            }
            updateUI();
            
            if (!dataLoaded) {
                dataLoaded = true;
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hide');
                    document.getElementById('app').classList.add('loaded');
                }, 500);
            }
        } catch(err) { console.warn(err); }
    });

    // загрузка
    send('get_balance');
    send('get_inventory');
    send('get_stats');

    // таймаут на всякий случай
    setTimeout(() => {
        if (!dataLoaded) {
            document.getElementById('loader').classList.add('hide');
            document.getElementById('app').classList.add('loaded');
        }
    }, 3000);

    document.querySelectorAll('.nav-item')[0].classList.add('active');
</script>
</body>
</html>
